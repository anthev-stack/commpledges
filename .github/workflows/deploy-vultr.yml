# Deploys to your Vultr VM on every push to `main`.
# Required (Repository secrets — recommended):
#   VULTR_SSH_KEY    — private key (full PEM, including BEGIN/END lines)
# Host/user/path may be Repository secrets OR Variables (same names):
#   VULTR_HOST, VULTR_USER, VULTR_DEPLOY_PATH
# Optional:
#   VULTR_SSH_PORT   — if not 22

name: Deploy to Vultr

on:
  push:
    branches: [main]

concurrency:
  group: deploy-vultr
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify deploy configuration
        shell: bash
        env:
          HOST: ${{ secrets.VULTR_HOST || vars.VULTR_HOST }}
          USER: ${{ secrets.VULTR_USER || vars.VULTR_USER }}
          DEPLOY_PATH: ${{ secrets.VULTR_DEPLOY_PATH || vars.VULTR_DEPLOY_PATH }}
          HAS_SSH_KEY: ${{ secrets.VULTR_SSH_KEY != '' }}
        run: |
          set -euo pipefail
          if [ -z "$HOST" ]; then
            echo "::error::VULTR_HOST is empty. Add Repository secret or Variable VULTR_HOST (your VPS IP or DNS name)."
            exit 1
          fi
          if [ -z "$USER" ]; then
            echo "::error::VULTR_USER is empty. Add Repository secret or Variable VULTR_USER (e.g. root)."
            exit 1
          fi
          if [ "$HAS_SSH_KEY" != "true" ]; then
            echo "::error::VULTR_SSH_KEY is missing. Add Repository secret VULTR_SSH_KEY (private key file contents, not the .pub line)."
            exit 1
          fi
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::VULTR_DEPLOY_PATH is empty. Add secret or Variable (e.g. /var/www/commpledges)."
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VULTR_HOST || vars.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER || vars.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            export APP_DIR="${{ secrets.VULTR_DEPLOY_PATH || vars.VULTR_DEPLOY_PATH }}"
            bash "$APP_DIR/scripts/server-deploy.sh"
